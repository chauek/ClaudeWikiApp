name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Setup Python 3.11 (node-gyp requires distutils, removed in 3.12)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Determine version
        id: version
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            VERSION="${GITHUB_REF_NAME#v}"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare release body
        id: body
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          FILE="docs/releases/v${VERSION}.md"
          if [[ -f "$FILE" ]]; then
            echo "Using custom release notes from $FILE"
            {
              echo 'body<<RELEASE_NOTES_EOF'
              cat "$FILE"
              echo 'RELEASE_NOTES_EOF'
            } >> "$GITHUB_OUTPUT"
            echo "has_custom=true" >> "$GITHUB_OUTPUT"
          else
            echo "No custom notes file; falling back to auto-generated."
            echo "body=" >> "$GITHUB_OUTPUT"
            echo "has_custom=false" >> "$GITHUB_OUTPUT"
          fi

      # Build without signing is always available.
      # Signing + notarization kick in only when the Apple Developer
      # credentials are wired up as repository secrets.
      - name: Check signing availability
        id: signed
        env:
          CERT_P12: ${{ secrets.DEVELOPER_ID_CERT_P12_BASE64 }}
        run: |
          if [[ -n "$CERT_P12" ]]; then
            echo "signing=true" >> "$GITHUB_OUTPUT"
            echo "==> Apple signing credentials present — will sign + notarize"
          else
            echo "signing=false" >> "$GITHUB_OUTPUT"
            echo "==> No signing credentials — building UNSIGNED DMG (pre-release)"
          fi

      - name: Import signing certificate
        if: steps.signed.outputs.signing == 'true'
        env:
          DEVELOPER_ID_CERT_P12_BASE64: ${{ secrets.DEVELOPER_ID_CERT_P12_BASE64 }}
          DEVELOPER_ID_CERT_PASSWORD:   ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD:            "ci-temp-keychain-password"
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/developer-id.p12"
          echo "$DEVELOPER_ID_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"

          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" \
              -P "$DEVELOPER_ID_CERT_PASSWORD" \
              -A -t cert -f pkcs12 \
              -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychain -d user | sed 's/"//g')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Build
        run: scripts/release/build.sh

      - name: Sign
        if: steps.signed.outputs.signing == 'true'
        env:
          DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}
        run: scripts/release/sign.sh

      - name: Notarize
        if: steps.signed.outputs.signing == 'true'
        env:
          APPLE_ID:           ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID:      ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: scripts/release/notarize.sh

      - name: Make DMG
        env:
          DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}
        run: scripts/release/make-dmg.sh

      - name: Create GitHub Release (signed)
        if: steps.signed.outputs.signing == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: ClaudeWiki ${{ steps.version.outputs.version }}
          body: ${{ steps.body.outputs.body }}
          generate_release_notes: ${{ steps.body.outputs.has_custom != 'true' }}
          files: |
            app/dist-electron/ClaudeWiki-${{ steps.version.outputs.version }}.dmg

      - name: Create GitHub Release (unsigned pre-release)
        if: steps.signed.outputs.signing != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: ClaudeWiki ${{ steps.version.outputs.version }}
          generate_release_notes: ${{ steps.body.outputs.has_custom != 'true' }}
          prerelease: true
          body: |
            > ⚠️ **Unsigned build.** This release is not code-signed or notarized.
            > On first launch macOS Gatekeeper will warn about an unidentified developer.
            > Right-click `ClaudeWiki.app` → **Open** → confirm in the dialog.
            > macOS remembers the exception so subsequent launches are clean.

            ${{ steps.body.outputs.body }}
          files: |
            app/dist-electron/ClaudeWiki-${{ steps.version.outputs.version }}.dmg
