name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-13  # Intel x64 runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: app

      - name: Build and package
        run: npx electron-vite build && npx electron-builder --mac --arch=x64
        working-directory: app
        env:
          # Skip code signing (unsigned build — users need to right-click > Open on first launch)
          # To enable signing: add CSC_LINK and CSC_KEY_PASSWORD secrets + Apple Developer account
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload DMG to Release
        uses: softprops/action-gh-release@v2
        with:
          name: ClaudeWiki ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            app/dist-electron/*.dmg
